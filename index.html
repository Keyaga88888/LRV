
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0f172a;
            overflow:hidden;
        }

        .bg{
            position:fixed;
            inset:0;
            background:
            radial-gradient(circle at top left,#1e3a8a,transparent 40%),
            radial-gradient(circle at bottom right,#7c3aed,transparent 40%),
            #0f172a;
        }

        .wrap{
            position:relative;
            z-index:2;
            width:100%;
            max-width:420px;
            padding:20px;
        }

        .card{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:20px;
            padding:35px;
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
        }

        h1{
            color:white;
            margin-bottom:25px;
            text-align:center;
            font-size:28px;
        }

        .field{
            margin-bottom:18px;
        }

        .input{
            width:100%;
            padding:14px;
            border:none;
            outline:none;
            border-radius:12px;
            background:rgba(255,255,255,0.12);
            color:white;
            font-size:15px;
        }

        .input::placeholder{
            color:#d1d5db;
        }

        .check{
            display:flex;
            align-items:center;
            gap:8px;
            margin-bottom:20px;
            color:white;
            font-size:14px;
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .help{
            margin-top:18px;
            text-align:center;
            color:#cbd5e1;
            font-size:14px;
        }

        .error{
            margin-top:8px;
            font-size:13px;
            color: yellow;
            opacity:.95;
        }
        #remember{
    width:18px;
    height:18px;
    accent-color:#2563eb;
    cursor:pointer;
}
    </style>
</head>

<body>

<div class="bg" aria-hidden="true"></div>

<main class="wrap">

    <div class="card">

        <h1>Đăng nhập</h1>

        <form method="POST" action="/login" autocomplete="on" novalidate>

            <div class="field">
                <input
                    id="email"
                    class="input"
                    type="email"
                    name="email"
                    placeholder="Tên đăng nhập"
                    required
                    autofocus
                    autocomplete="username"
                >
            </div>

            <div class="field">
                <input
                    id="password"
                    class="input"
                    type="password"
                    name="password"
                    placeholder="Mật khẩu"
                    required
                    autocomplete="current-password"
                >
            </div>

            <div class="check">
                <input
                    id="remember"
                    type="checkbox"
                    name="remember"
                >

                <label for="remember">
                    Ghi nhớ mật khẩu
                </label>
            </div>

            <div class="actions">
                <button type="submit" class="btn">
                    Đăng nhập
                </button>
            </div>

            <p class="help">
                Hỗ trợ kỹ thuật 0842460196 - Zalo
            </p>

        </form>

    </div>

</main>

</html>
