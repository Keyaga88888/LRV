# Dockerfile cần sửa
# Hiện tại Dockerfile của bạn đã cài Supervisor, nhưng chưa copy file cấu hình.
# Thêm:
# COPY docker/supervisor/laravel-worker.conf /etc/supervisor/conf.d/laravel-worker.conf