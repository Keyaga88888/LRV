server {

    listen 80;

    server_name _;

    root /var/www/public;

    index index.php index.html index.htm;

    charset utf-8;

    client_max_body_size 100M;

    server_tokens off;

    ############################################################
    # Logs
    ############################################################

    access_log /var/log/nginx/access.log;

    error_log /var/log/nginx/error.log warn;

    ############################################################
    # Security Headers
    ############################################################

    add_header X-Frame-Options "SAMEORIGIN" always;

    add_header X-Content-Type-Options "nosniff" always;

    add_header X-XSS-Protection "1; mode=block" always;

    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    ############################################################
    # Gzip
    ############################################################

    gzip on;

    gzip_comp_level 6;

    gzip_min_length 1024;

    gzip_proxied any;

    gzip_vary on;

    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    ############################################################
    # Laravel
    ############################################################

    location / {

        try_files $uri $uri/ /index.php?$query_string;

    }

    ############################################################
    # PHP
    ############################################################

    location ~ \.php$ {

        try_files $uri =404;

        fastcgi_pass app:9000;

        fastcgi_index index.php;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;

        fastcgi_param DOCUMENT_ROOT $realpath_root;

        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_buffers 16 16k;

        fastcgi_buffer_size 32k;

        fastcgi_read_timeout 300;

        fastcgi_send_timeout 300;

    }

    ############################################################
    # Static Files
    ############################################################

    location ~* \.(jpg|jpeg|gif|png|css|js|ico|svg|webp|woff|woff2|ttf)$ {

        expires 30d;

        access_log off;

        add_header Cache-Control "public";

    }

    ############################################################
    # Deny Hidden Files
    ############################################################

    location ~ /\.(?!well-known).* {

        deny all;

    }

    ############################################################
    # Deny Sensitive Files
    ############################################################

    location ~* \.(env|log|ini|sql|bak|config)$ {

        deny all;

    }

    ############################################################
    # Favicon
    ############################################################

   location = /favicon.ico {

      try_files /favicon.ico =204;

      access_log off;

      log_not_found off;

}

    ############################################################
    # Robots
    ############################################################

    location = /robots.txt {

        access_log off;

        log_not_found off;

    }

    ############################################################
    # Error Pages
    ############################################################

    error_page 404 /index.php;

}
# Nó làm gì?
# Browser > Nginx > PHP > Laravel > MySQL

# Browser : 
# Ví dụ : http://localhost > Nginx nhận > Laravel xử lý > Response

# root : 
# root /var/www/public;
# Laravel luôn phải trỏ vào
# public/
# không phải
# /var/www

# index : 
# index index.php;
# Khi truy cập
# localhost
# Nó sẽ chạy
# public/index.php

# try_files : 
# try_files $uri $uri/ /index.php?$query_string;
# Đây là dòng quan trọng nhất.
# Ví dụ
# /api/login
# Không có file > Laravel Router xử lý
# Nếu bỏ dòng này > 404 Not Found

