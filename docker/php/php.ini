;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; PHP Configuration
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[PHP]

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Timezone
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

date.timezone = Asia/Ho_Chi_Minh

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Memory
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

memory_limit = 512M

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Execution
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

max_execution_time = 300

max_input_time = 300

default_socket_timeout = 300

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Upload
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

file_uploads = On

upload_max_filesize = 100M

post_max_size = 100M

max_file_uploads = 50

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Variables
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

max_input_vars = 5000

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Error
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

display_errors = Off

display_startup_errors = Off

log_errors = On

error_reporting = E_ALL

html_errors = Off

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Session
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

session.save_handler = files

session.gc_maxlifetime = 1440

session.cookie_httponly = On

session.use_strict_mode = On

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Realpath
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

realpath_cache_size = 4096K

realpath_cache_ttl = 600

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Resource
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

default_charset = UTF-8

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Opcache
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

opcache.enable = 1

opcache.enable_cli = 1

opcache.memory_consumption = 256

opcache.interned_strings_buffer = 32

opcache.max_accelerated_files = 20000

opcache.max_wasted_percentage = 10

opcache.validate_timestamps = 1

opcache.revalidate_freq = 0

opcache.fast_shutdown = 1

opcache.save_comments = 1

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; JIT
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

opcache.jit_buffer_size = 128M

opcache.jit = tracing

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Expose
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

expose_php = Off

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Security
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

allow_url_fopen = On

allow_url_include = Off

cgi.fix_pathinfo = 0

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Output Buffer
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

output_buffering = 4096

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Compression
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

zlib.output_compression = Off

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; MySQL
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

mysqlnd.collect_statistics = Off

mysqlnd.collect_memory_statistics = Off

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Assert
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

zend.assertions = -1

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Date
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

date.default_latitude = 10.8231

date.default_longitude = 106.6297

# Bây giờ Dockerfile phải sửa
# Hiện tại Dockerfile của bạn chưa dùng file php.ini này.
# Thêm đoạn sau vào Dockerfile (ngay sau phần cài extension là hợp lý):
# COPY docker/php/php.ini /usr/local/etc/php/conf.d/custom.ini
# Ví dụ:
###############################################
# PHP Extensions
###############################################
# RUN docker-php-ext-configure gd \
#         --with-freetype \
#         --with-jpeg \
#     && docker-php-ext-install \
#         pdo_mysql \
#         bcmath \
#         gd \
#         zip \
#         exif \
#         pcntl

# COPY docker/php/php.ini /usr/local/etc/php/conf.d/custom.ini
# Sau đó build lại:
# docker compose up --build -d

# 1 Timezone :
# date.timezone = Asia/Ho_Chi_Minh
# Laravel và PHP cùng dùng múi giờ Việt Nam.

# 2 Memory : 
# memory_limit = 512M
# Laravel:
# Excel
# PDF
# Image
# Queue
# đều cần RAM.
# 512MB là hợp lý.

# 3 Upload :
# upload_max_filesize=100M
# Upload :
# Avatar
# PDF
# Excel
# Video nhỏ
# đều được.

# 4 display_errors : 
# Production :
# display_errors=Off
# Không để lộ lỗi PHP cho người dùng.
# Laravel sẽ ghi lỗi vào log.

# 5. log_errors :
# log_errors=On
# Lỗi sẽ được ghi lại.

# 6. OPCache : 
# Đây là phần tăng tốc.
# opcache.enable=1
# Laravel sẽ chạy nhanh hơn.
# Không cần biên dịch lại file PHP mỗi request.

# 7. expose_php : 
# expose_php=Off
# Ẩn header :
# X-Powered-By: PHP/8.4
# Tăng tính bảo mật.

# Việc cần làm sau bước này
# Sau khi thêm dòng COPY vào Dockerfile, chạy:
# docker compose down
# docker compose up --build -d
# để image mới nhận cấu hình PHP.