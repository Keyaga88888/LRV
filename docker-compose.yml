services:

#############################################
# Laravel App
#############################################

  app:

    build:
      context: .
      dockerfile: Dockerfile
      pull: true

    image: horizon888/keyagatwo-app:latest

    container_name: keyagatwo_app

    restart: unless-stopped

    working_dir: /var/www

    env_file:
      - .env

    volumes:
      - .:/var/www

    depends_on:

      mysql:
        condition: service_healthy

      redis:
        condition: service_started

    healthcheck:

      test:
        [
          "CMD-SHELL",
          "php -v || exit 1"
        ]

      interval: 30s

      timeout: 5s

      retries: 3

      start_period: 20s

    networks:

      - backend
# Hãy dùng YAML Anchor để gọn hơn:
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
# Sau đó mỗi service chỉ cần:
# logging: *default-logging
#############################################
# Horizon
#############################################
horizon:

  build:
    context: .
    dockerfile: Dockerfile
    pull: true

  image: horizon888/keyagatwo-horizon:latest

  restart: always

  working_dir: /var/www

  env_file:
    - .env

  command: php artisan horizon

  volumes:
    - .:/var/www

  depends_on:
    - mysql
    - redis

  networks:
    - backend

  x-logging: &default-logging
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"
#############################################
# Reverb
#############################################
reverb:

  build:
    context: .
    dockerfile: Dockerfile
    pull: true

  image: horizon888/keyagatwo-reverb:latest

  restart: always

  working_dir: /var/www

  env_file:
    - .env

  command: php artisan reverb:start --host=0.0.0.0 --port=8080

  ports:
    - "8080:8080"

  volumes:
    - .:/var/www

  depends_on:
    - redis

  networks:
    - backend

  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"
#############################################
# Queue Worker
#############################################

  worker:

    image: horizon888/keyagatwo-app:latest

    container_name: keyagatwo_worker

    restart: unless-stopped

    working_dir: /var/www

    env_file:

      - .env
# nếu muốn dùng Supervisor  |  laravel-worker.conf
        # command: supervisord -n
    command: >

      php artisan queue:work redis

      --sleep=3

      --tries=3

      --timeout=90

    volumes:

      - .:/var/www

    depends_on:

      mysql:
        condition: service_healthy

      redis:
        condition: service_started

    healthcheck:

      test:

        [

          "CMD-SHELL",

          "php artisan --version || exit 1"

        ]

      interval: 30s

      timeout: 5s

      retries: 3

    networks:

      - backend

  x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

#############################################
# Scheduler
#############################################

  scheduler:

    image: horizon888/keyagatwo-app:latest

    container_name: keyagatwo_scheduler

    restart: unless-stopped

    working_dir: /var/www

    env_file:

      - .env

    command: >

      php artisan schedule:work

    volumes:

      - .:/var/www

    depends_on:

      mysql:
        condition: service_healthy

      redis:
        condition: service_started

    healthcheck:

      test:

        [

          "CMD-SHELL",

          "php artisan --version || exit 1"

        ]

      interval: 30s

      timeout: 5s

      retries: 3

    networks:

      - backend

    x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

  #############################################
# Nginx
#############################################

  nginx:

    image: nginx:alpine

    container_name: keyagatwo_nginx

    restart: unless-stopped

    depends_on:

      app:
        condition: service_healthy

    ports:

      - "80:80"

    volumes:

      - .:/var/www

      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    healthcheck:

      test:

        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1 || exit 1"
        ]

      interval: 30s

      timeout: 5s

      retries: 3

      start_period: 10s

    networks:

      - frontend

      - backend

    x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

#############################################
# MySQL
#############################################
    # MYSQL_DATABASE: hrm
    # MYSQL_ROOT_PASSWORD: root

    # Trong .env: DB_DATABASE=hrm DB_PASSWORD=root  Đổi môi trường sẽ không phải sửa docker-compose.yml.
  mysql:

    image: mysql:8.4

    container_name: keyagatwo_mysql

    restart: unless-stopped

    environment:

      MYSQL_DATABASE: ${DB_DATABASE}

      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}

      MYSQL_USER: ${DB_USERNAME}

      MYSQL_PASSWORD: ${DB_PASSWORD}

      TZ: Asia/Ho_Chi_Minh

    command: >

      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

    ports:

      - "3306:3306"

    volumes:

      - mysql_data:/var/lib/mysql

      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:

      test:

        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"
        ]

      interval: 10s

      timeout: 5s

      retries: 10

      start_period: 30s

    networks:

      - backend

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

#############################################
# Redis
#############################################

  redis:

    image: redis:7-alpine

    container_name: keyagatwo_redis

    restart: unless-stopped

    command: >

      redis-server
      --appendonly yes
      --save 60 1000

    ports:

      - "6379:6379"

    volumes:

      - redis_data:/data

    healthcheck:

      test:

        [
          "CMD",
          "redis-cli",
          "ping"
        ]

      interval: 10s

      timeout: 5s

      retries: 5

    networks:

      - backend

    x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

    #############################################
# Mailpit
#############################################

  mailpit:

    image: axllent/mailpit:latest

    container_name: keyagatwo_mailpit

    restart: unless-stopped

    ports:

      - "1025:1025"

      - "8025:8025"

    environment:

      MP_MAX_MESSAGES: 5000

      MP_SMTP_AUTH_ACCEPT_ANY: 1

      MP_SMTP_AUTH_ALLOW_INSECURE: 1

    networks:

      - backend

  x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

#############################################
# phpMyAdmin
#############################################

  phpmyadmin:

    image: phpmyadmin:latest

    container_name: keyagatwo_phpmyadmin

    restart: unless-stopped

    depends_on:

      mysql:
        condition: service_healthy

    environment:

      PMA_HOST: mysql

      PMA_PORT: 3306

      PMA_ARBITRARY: 1

      UPLOAD_LIMIT: 256M

    ports:

      - "8081:80"

    networks:

      - backend

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

#############################################
# Meilisearch
#############################################

  meilisearch:

    image: getmeili/meilisearch:v1.15

    container_name: keyagatwo_meilisearch

    restart: unless-stopped

    environment:

      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}

      MEILI_ENV: production

      MEILI_NO_ANALYTICS: "true"

    ports:

      - "7700:7700"

    volumes:

      - meili_data:/meili_data

    healthcheck:

      test:

        [

          "CMD",

          "wget",

          "--spider",

          "-q",

          "http://127.0.0.1:7700/health"

        ]

      interval: 30s

      timeout: 5s

      retries: 5

    networks:

      - backend

  x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

#############################################
# MinIO
#############################################

  minio:

    image: minio/minio:latest

    container_name: keyagatwo_minio

    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:

      MINIO_ROOT_USER: ${MINIO_ROOT_USER}

      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001

    ports:

      - "9000:9000"

      - "9001:9001"

    volumes:

      - minio_data:/data

    healthcheck:

      test:

        [

          "CMD",

          "curl",

          "-f",

          "http://127.0.0.1:9000/minio/health/live"

        ]

      interval: 30s

      timeout: 5s

      retries: 5

    networks:

      - backend

    x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

#############################################
# Soketi
#############################################

  soketi:

    image: quay.io/soketi/soketi:latest

    container_name: keyagatwo_soketi

    restart: unless-stopped

    environment:

      SOKETI_DEFAULT_APP_ID: ${SOKETI_APP_ID}

      SOKETI_DEFAULT_APP_KEY: ${SOKETI_APP_KEY}

      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_APP_SECRET}

      SOKETI_DEFAULT_APP_ENABLE_CLIENT_MESSAGES: "true"

    ports:

      - "6001:6001"

    healthcheck:

      test:

        [

          "CMD",

          "wget",

          "--spider",

          "-q",

          "http://127.0.0.1:6001"

        ]

      interval: 30s

      timeout: 5s

      retries: 5

    networks:

      - backend

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
#############################################
# Prometheus
#############################################

  prometheus:

    image: prom/prometheus:latest

    container_name: keyagatwo_prometheus

    restart: unless-stopped

    ports:

      - "9090:9090"

    volumes:

      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

      - prometheus_data:/prometheus

    command:

      - "--config.file=/etc/prometheus/prometheus.yml"

      - "--storage.tsdb.path=/prometheus"

      - "--storage.tsdb.retention.time=15d"

      - "--web.enable-lifecycle"

    healthcheck:

      test:

        [

          "CMD",

          "wget",

          "--spider",

          "-q",

          "http://127.0.0.1:9090/-/healthy"

        ]

      interval: 30s

      timeout: 5s

      retries: 5

    networks:

      - backend

#############################################
# Grafana
#############################################

  grafana:

    image: grafana/grafana:latest

    container_name: keyagatwo_grafana

    restart: unless-stopped

    depends_on:

      - prometheus

    ports:

      - "3000:3000"

    environment:

      GF_SECURITY_ADMIN_USER: admin

      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}

      GF_USERS_ALLOW_SIGN_UP: "false"

    volumes:

      - grafana_data:/var/lib/grafana

    healthcheck:

      test:

        [

          "CMD",

          "wget",

          "--spider",

          "-q",

          "http://127.0.0.1:3000/api/health"

        ]

      interval: 30s

      timeout: 5s

      retries: 5

    networks:

      - frontend

      - backend

#############################################
# Networks
#############################################

networks:

  frontend:

    driver: bridge

  backend:

    driver: bridge

#############################################
# Volumes
#############################################

volumes:

  mysql_data:

  redis_data:

  meili_data:

  minio_data:

  grafana_data:

  prometheus_data:
    # Sau này chỉ cần:
    # docker compose pull
    # là lấy image mới từ Docker Hub.
    # Khi đang phát triển:
    # docker compose up --build -d
    # Logging :
    # Không để log phình lên vô hạn.
    # Volume :
    #  mysql_data
    # Database không mất khi xóa container.
    # Network :
    # backend
    # App ↔ MySQL ↔ Redis ↔ Nginx nằm cùng mạng Docker.
    # Healthcheck :
    # Docker biết MySQL đã sẵn sàng hay chưa.
    # env_file :
    # Docker đọc trực tiếp:
    # .env
    # Không cần ghi mật khẩu cứng trong Compose.
    # Docker Hub :
    # Sau này GitHub Actions sẽ push:
    # horizon888/keyagatwo-app:latest
    # Server chỉ cần:
    # docker compose pull
    # docker compose up -d
    # Supervisor : 
    # Bạn đã tạo : docker/supervisor/laravel-worker.conf
    # Nhưng hiện tại Worker đang chạy bằng: command:        |  nên file Supervisor chưa được sử dụng.
# Image : 
# image:horizon888/keyagatwo-app
# Networks : 
# backend
# Volume :
# mysql_data
# redis_data
# Logging :
# max-size
# max-file
# restart :
# restart: always

#                                   Internet
#                                     │
#                                     ▼
#                               Nginx (80)
#                                     │
#                                     ▼
#                            Laravel App (PHP-FPM)
#                                     │
#         ┌───────────────┬────────────┼───────────────┬──────────────────┐
#         ▼               ▼            ▼               ▼                  ▼
#      MySQL           Redis      Meilisearch       MinIO             Soketi
#         │               │            │               │                  │
#         │               │            │               │                  │
#         ▼               ▼            ▼               ▼                  ▼
#  Database      Queue / Cache    Full-text      S3 Storage       WebSocket
#                Session          Search                         Realtime

#         ▲
#         │
#  ┌──────┴───────────┐
#  ▼                  ▼
# Worker         Scheduler
# (queue:work)   (schedule:work)

# ──────────────────────────────────────────────────────────────────────────

#                Monitoring & Development

#         Prometheus  ─────────►  Grafana

#         phpMyAdmin ─────────►  MySQL

#         Mailpit    ─────────►  SMTP Email Testing


    #                 Internet
    #                     │
    #                     ▼
    #             frontend Network
    #                     │
    #      ┌──────────────┴──────────────┐
    #      ▼                             ▼
    #   Nginx                       Grafana
    #      │
    #      ▼
    #             backend Network
    #      ┌──────┬────────┬──────────┬────────┐
    #      ▼      ▼        ▼          ▼        ▼
    #    App    Worker  Scheduler   Redis   MySQL
    #      │
    #      ├──────────────┐
    #      ▼              ▼
    #  Meilisearch     MinIO
    #      │
    #      ▼
    #   Prometheus
# Sau khi thêm Horizao , reverb:start
# Browser
#     │
#     ▼
# Nginx
#     │
#     ▼
# Laravel App (PHP-FPM)
#     │
#  ┌──┼───────────────┬─────────────┬───────────────┐
#  ▼  ▼               ▼             ▼               ▼
# MySQL Redis     Horizon      Scheduler      Reverb
#                   │
#                   ▼
#               Queue Jobs

# Luồng Request
# Ví dụ người dùng đăng nhập:
# Browser > Nginx > Laravel > MySQL > Response  > Browser

# Luồng Queue
# Ví dụ gửi Email:
# Controller > Dispatch Job > Redis Queue > Worker > Mailpit (Dev) hoặc SMTP thật (Production)

# Luồng Scheduler
# Scheduler > php artisan schedule:work > Kernel/Schedule > Attendance > Report > Backup > Cleanup

# Luồng Upload
# Browser > Laravel > MinIO > Lưu File > Database lưu URL

# Luồng Search
# Browser > Laravel > Meilisearch > Kết quả Search > Browser

# Luồng Realtime
# Ví dụ Chat hoặc Notification:
# Laravel Event > Broadcast > Soketi > Browser nhận ngay lập tức

# Luồng Monitoring
# Prometheus > Thu thập Metrics > Grafana > Dashboard > CPU  RAM  Network  Response Time  Docker

# Luồng Database
# Browser > phpMyAdmin > MySQL

# Luồng Docker Hub
# GitHub > GitHub Actions > Docker Build > Docker Hub > VPS  > docker compose pull > docker compose up -d
