# Đây là workflow sẽ chạy mỗi lần bạn push lên GitHub.
# git push > GitHub > GitHub Actions > Composer Install 
# > PHPUnit > PHPStan > Laravel Pint > Docker Build > Docker Hub
# Trước tiên cần tạo GitHub Secrets
# Repository > Settings > Secrets and Variables > Actions > New Repository Secret
# Thêm:
# Secret         	Giá trị
# DOCKER_USERNAME	horizon888
# DOCKER_PASSWORD	Docker Hub Access Token

# Không dùng mật khẩu Docker Hub.

# Hãy tạo Access Token trong Docker Hub rồi lưu vào DOCKER_PASSWORD.
name: Laravel CI

on:

  push:

    branches:

      - main

      - develop

  pull_request:

    branches:

      - main

jobs:

  laravel:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Setup PHP

        uses: shivammathur/setup-php@v2

        with:

          php-version: "8.4"

          extensions: mbstring, pdo_mysql, redis, bcmath

          coverage: none

      - name: Cache Composer

        uses: actions/cache@v4

        with:

          path: vendor

          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install Composer

        run: composer install --no-interaction --prefer-dist

      - name: Copy ENV

        run: cp .env.example .env

      - name: Generate Key

        run: php artisan key:generate

      - name: Laravel Pint

        run: ./vendor/bin/pint --test

      - name: PHPStan

        run: ./vendor/bin/phpstan analyse

      - name: PHPUnit

        run: php artisan test

      - name: Login Docker Hub

        uses: docker/login-action@v3

        with:

          username: ${{ secrets.DOCKER_USERNAME }}

          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image

        run: |

          docker build \
          -t horizon888/keyagatwo-app:latest \
          .

      - name: Push Docker Image

        run: |

          docker push horizon888/keyagatwo-app:latest
# Luồng CI
# Git Push > Checkout > Composer > Laravel Pint 
# > PHPStan > PHPUnit > Docker Build > Docker Hub

# Sau khi xong :
# Docker Hub sẽ có
# horizon888/keyagatwo-app:latest
# Server chỉ cần
# docker compose pull
# là lấy image mới.