# Đây là workflow sẽ chạy mỗi lần bạn push lên GitHub.
# git push > GitHub > GitHub Actions > Composer Install 
# > PHPUnit > PHPStan > Laravel Pint > Docker Build > Docker Hub
# Trước tiên cần tạo GitHub Secrets
# Repository > Settings > Secrets and Variables > Actions > New Repository Secret
# Thêm:
# Secret         	Giá trị
# DOCKER_USERNAME	horizon888
# DOCKER_PASSWORD	Docker Hub Access Token

# Không dùng mật khẩu Docker Hub.

# Hãy tạo Access Token trong Docker Hub rồi lưu vào DOCKER_PASSWORD.
name: Laravel CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:

  laravel:

    runs-on: ubuntu-latest

    services:

      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: attendance_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:

      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring,pdo_mysql,bcmath,redis
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install Composer
        run: composer install --no-interaction --prefer-dist

      - name: Create ENV
        run: |

          cp .env.example .env

          echo "APP_ENV=testing" >> .env
          echo "APP_DEBUG=false" >> .env

          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=attendance_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=root" >> .env

          echo "CACHE_STORE=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env

          echo "BROADCAST_CONNECTION=log" >> .env

          echo "REDIS_CLIENT=phpredis" >> .env
          echo "REDIS_HOST=127.0.0.1" >> .env
          echo "REDIS_PORT=6379" >> .env

          echo "REVERB_APP_ID=local" >> .env
          echo "REVERB_APP_KEY=localkey" >> .env
          echo "REVERB_APP_SECRET=localsecret" >> .env
          echo "REVERB_HOST=127.0.0.1" >> .env
          echo "REVERB_PORT=8080" >> .env
          echo "REVERB_SCHEME=http" >> .env

      - name: Generate Key
        run: php artisan key:generate --force

      - name: Run Migration
        run: php artisan migrate --force

      - name: Laravel Pint
        run: ./vendor/bin/pint --test

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse

      - name: PHPUnit
        run: php artisan test

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker
        run: |
          docker build -t horizon888/keyagatwo-app:latest .

      - name: Push Docker
        run: |
          docker push horizon888/keyagatwo-app:latest
# Luồng CI
# Git Push > Checkout > Composer > Laravel Pint 
# > PHPStan > PHPUnit > Docker Build > Docker Hub

# Sau khi xong :
# Docker Hub sẽ có
# horizon888/keyagatwo-app:latest
# Server chỉ cần
# docker compose pull
# là lấy image mới.
